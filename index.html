<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>События</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='50' x='50' dominant-baseline='central' text-anchor='middle' font-size='80'>🎇</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ru.js"></script>
</head>

<body>
    <div class="app-container">
        <header>
            <div class="global-coundown-container">
                <h1>События</h1>
            </div>
            <div class="header-controls">
                <button id="sort-btn" class="btn btn-secondary" title="Сортировать по датам">↕</button>
                <div class="labels-mgmt-wrap">
                    <button id="labels-mgmt-btn" class="btn btn-secondary" title="Управление метками">🏷️</button>
                    <div id="labels-mgmt-dropdown" class="labels-mgmt-dropdown" style="display: none;">
                        <!-- Сюда рендерятся метки -->
                    </div>
                </div>
                <button id="add-event-btn" class="btn btn-primary">Добавить событие</button>
                <span id="event-count" style="font-size:12px;color:#666;white-space:nowrap;"></span>
            </div>
            <div class="status-bar">
                <span id="sync-status">Локальное хранилище</span>
                <button id="sync-btn" class="btn btn-small">Синхронизировать</button>
                <button id="settings-btn" class="btn btn-secondary" title="Настройки">⚙️</button>
            </div>
        </header>

        <div id="events-list" class="events-list"></div>
    </div>

    <div id="settings-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3>Настройки GitHub Gist</h3>
            <p>Введите Token (1-я строка) и Gist ID (2-я строка):</p>
            <textarea id="settings-input" placeholder="ghp_xxx...&#10;1afd0be..."></textarea>
            <div class="modal-actions">
                <button id="settings-cancel" class="btn">Отмена</button>
                <button id="settings-save" class="btn btn-primary">ОК</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
