<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ru.js"></script>
</head>

<body>
    <div class="app-container">
        <header>
            <h1>События</h1>
            <div class="header-controls">
                <button id="settings-btn" class="btn btn-secondary" title="Настройки">⚙️</button>
                <button id="add-event-btn" class="btn btn-primary">Добавить событие</button>
                <button id="sort-btn" class="btn btn-secondary" title="Сортировать по датам">&#8597;</button>
            </div>
        </header>

        <div id="events-list" class="events-list"></div>

        <div class="status-bar">
            <span id="sync-status">Локальное хранилище</span>
            <button id="sync-btn" class="btn btn-small">Синхронизировать с Gist</button>
        </div>
    </div>

    <div id="settings-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3>Настройки GitHub Gist</h3>

            <label class="settings-label">
                GitHub Token
                <span class="settings-hint">Хранится в sessionStorage (сбрасывается при закрытии вкладки)</span>
            </label>
            <input id="settings-token" type="password" class="settings-field" placeholder="ghp_xxxxxxxxxxxx"
                autocomplete="off" />

            <label class="settings-label" style="margin-top: 14px;">
                Gist ID
                <span class="settings-hint">Хранится в localStorage</span>
            </label>
            <input id="settings-gist" type="text" class="settings-field" placeholder="1afd0be..." autocomplete="off" />

            <div class="modal-actions">
                <button id="settings-cancel" class="btn">Отмена</button>
                <button id="settings-save" class="btn btn-primary">ОК</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
