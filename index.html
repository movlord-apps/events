<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>Напоминания</h1>
            <button id="add-event-btn" class="btn btn-primary">Добавить событие</button>
        </header>

        <div id="events-list" class="events-list">
            <!-- События будут добавляться сюда динамически -->
        </div>

        <div id="status-bar" class="status-bar">
            <span id="sync-status">Локальное хранилище</span>
            <button id="sync-btn" class="btn btn-small">Синхронизировать с Gist</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
